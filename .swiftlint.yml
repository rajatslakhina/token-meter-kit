disabled_rules:
  - todo

opt_in_rules:
  - empty_count
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - explicit_init
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - redundant_nil_coalescing
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument

excluded:
  - .build
  - Tests

line_length:
  warning: 120
  error: 160

identifier_name:
  min_length: 1
  allowed_symbols: ["_"]

type_name:
  min_length: 3
  max_length: 50

file_length:
  warning: 400
  error: 600
